name: EAS iOS Local Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile to use
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: eas-ios-preview-build
  cancel-in-progress: false

jobs:
  build-ios-preview:
    runs-on: macos-15
    timeout-minutes: 120
    env:
      CI: '1'
      COCOAPODS_DISABLE_STATS: 'true'
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version
          pod --version
          fastlane --version

      - name: Validate Expo token
        run: |
          set -euo pipefail

          if [[ -z "${EXPO_TOKEN:-}" ]]; then
            echo "EXPO_TOKEN secret is not configured for this repository."
            echo "Add it in GitHub repo settings, then rerun this workflow."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Verify Expo account
        working-directory: apps/mobile
        run: npx eas-cli@latest whoami

      - name: Export build profile environment
        working-directory: apps/mobile
        run: |
          set -euo pipefail

          node - "${{ inputs.profile }}" <<'NODE' >> "$GITHUB_ENV"
          const fs = require('node:fs');

          const profileName = process.argv[2];
          const easConfig = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
          const profile = easConfig.build?.[profileName];

          if (!profile) {
            throw new Error(`Missing build profile: ${profileName}`);
          }

          const env = profile.env ?? {};
          const requiredKeys = ['EXPO_PUBLIC_API_URL', 'EXPO_PUBLIC_STANDALONE_TRANSIT'];

          for (const key of requiredKeys) {
            if (typeof env[key] !== 'string' || env[key].trim() === '') {
              throw new Error(`Build profile ${profileName} is missing required env key ${key}`);
            }
          }

          console.log('NODE_ENV=production');

          for (const [key, value] of Object.entries(env)) {
            if (typeof value === 'string' && value.trim() !== '') {
              console.log(`${key}=${value}`);
            }
          }
          NODE

      - name: Build iOS app locally with EAS
        id: build
        working-directory: apps/mobile
        run: |
          set -euo pipefail

          artifact_dir="$RUNNER_TEMP/eas-local-artifacts"
          artifact_path="$artifact_dir/timisoara-ios-${{ inputs.profile }}.ipa"

          mkdir -p "$artifact_dir"

          export EAS_LOCAL_BUILD_ARTIFACTS_DIR="$artifact_dir"
          npx eas-cli@latest build \
            --platform ios \
            --profile "${{ inputs.profile }}" \
            --local \
            --non-interactive \
            --output "$artifact_path"

          if [[ ! -f "$artifact_path" ]]; then
            echo "Local EAS build did not produce an IPA at $artifact_path"
            exit 1
          fi

          {
            echo "build_profile=${{ inputs.profile }}"
            echo "artifact_path=$artifact_path"
            echo "artifact_name=$(basename "$artifact_path")"
          } >> "$GITHUB_OUTPUT"

      - name: Upload local iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-local-${{ inputs.profile }}
          path: ${{ steps.build.outputs.artifact_path }}

      - name: Summarize build
        run: |
          {
            echo "## EAS iOS Local Build"
            echo ""
            echo "- Profile: ${{ steps.build.outputs.build_profile }}"
            echo "- Artifact name: ${{ steps.build.outputs.artifact_name }}"
            echo "- Uploaded artifact: ios-local-${{ inputs.profile }}"
          } >> "$GITHUB_STEP_SUMMARY"