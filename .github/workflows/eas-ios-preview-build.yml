name: EAS iOS Preview Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile to use
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: eas-ios-preview-build
  cancel-in-progress: false

jobs:
  build-ios-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Validate Expo token
        run: |
          set -euo pipefail

          if [[ -z "${EXPO_TOKEN:-}" ]]; then
            echo "EXPO_TOKEN secret is not configured for this repository."
            echo "Add it in GitHub repo settings, then rerun this workflow."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Verify Expo account
        working-directory: apps/mobile
        run: npx eas-cli@latest whoami

      - name: Start and wait for iOS build
        id: build
        working-directory: apps/mobile
        run: |
          set -euo pipefail

          build_json_file="$RUNNER_TEMP/eas-ios-build.json"

          npx eas-cli@latest build \
            --platform ios \
            --profile "${{ inputs.profile }}" \
            --non-interactive \
            --wait \
            --json \
            --message "GitHub Actions iOS ${GITHUB_SHA::7}" \
            > "$build_json_file"

          node - "$build_json_file" <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');

          const buildJsonPath = process.argv[2];
          const raw = fs.readFileSync(buildJsonPath, 'utf8').trim();
          const parsed = JSON.parse(raw);
          const build = Array.isArray(parsed) ? parsed[0] : parsed;

          if (!build) {
            throw new Error('EAS build response did not include a build object');
          }

          const artifacts = build.artifacts ?? {};
          const buildUrl = artifacts.buildUrl ?? artifacts.applicationArchiveUrl ?? '';

          console.log(`build_id=${build.id ?? ''}`);
          console.log(`build_status=${build.status ?? ''}`);
          console.log(`build_profile=${build.buildProfile ?? ''}`);
          console.log(`build_url=${buildUrl}`);
          NODE

      - name: Summarize build
        run: |
          {
            echo "## EAS iOS Build"
            echo ""
            echo "- Profile: ${{ steps.build.outputs.build_profile }}"
            echo "- Build ID: ${{ steps.build.outputs.build_id }}"
            echo "- Status: ${{ steps.build.outputs.build_status }}"
            echo "- Artifact: ${{ steps.build.outputs.build_url }}"
          } >> "$GITHUB_STEP_SUMMARY"