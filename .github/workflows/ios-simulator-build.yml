name: iOS Simulator Build

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/ios-simulator-build.yml
      - apps/mobile/**
      - package.json
      - package-lock.json

jobs:
  build-ios-simulator:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      CI: '1'
      COCOAPODS_DISABLE_STATS: 'true'
      EXPO_PUBLIC_API_URL: https://timisoara-app-production.up.railway.app
      EXPO_PUBLIC_STANDALONE_TRANSIT: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          pod --version

      - name: Install dependencies
        run: npm ci

      - name: Verify Metro resolves React Native from the app workspace
        working-directory: apps/mobile
        run: |
          set -euo pipefail

          npx expo export --platform ios --clear --dump-sourcemap

          map_file="$(find dist -type f -name '*.map' | head -n 1)"

          if [[ -z "$map_file" ]]; then
            echo "No source map was generated"
            exit 1
          fi

          node - "$map_file" <<'NODE'
          const fs = require('node:fs');

          const mapFile = process.argv[2];
          const map = JSON.parse(fs.readFileSync(mapFile, 'utf8'));
          const sources = Array.isArray(map.sources) ? map.sources : [];

          const appRnCount = sources.filter((source) =>
            source.startsWith('/apps/mobile/node_modules/react-native/'),
          ).length;
          const rootRnCount = sources.filter((source) =>
            source.startsWith('/node_modules/react-native/'),
          ).length;

          console.log(`app_rn_count=${appRnCount}`);
          console.log(`root_rn_count=${rootRnCount}`);

          if (appRnCount === 0) {
            console.error('No app-local React Native paths found in the iOS bundle source map');
            process.exit(1);
          }

          if (rootRnCount !== 0) {
            console.error('Unexpected hoisted React Native paths found in the iOS bundle source map');
            process.exit(1);
          }
          NODE

      - name: Generate iOS project
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --non-interactive --clean

      - name: Build release simulator app
        working-directory: apps/mobile
        run: |
          set -euo pipefail

          workspace="$(find ios -maxdepth 1 -name '*.xcworkspace' | head -n 1)"
          project="$(find ios -maxdepth 1 -name '*.xcodeproj' | head -n 1)"

          if [[ -z "$workspace" && -z "$project" ]]; then
            echo "No Xcode workspace or project was generated"
            exit 1
          fi

          if [[ -n "$project" ]]; then
            scheme="$(xcodebuild -list -project "$project" | awk '
              /^Schemes:/ { in_schemes=1; next }
              in_schemes && NF {
                sub(/^[[:space:]]+/, "", $0)
                print
                exit
              }
            ')"
          else
            scheme=""
          fi

          if [[ -z "$scheme" && -n "$project" ]]; then
            scheme="$(basename "$project" .xcodeproj)"
          fi

          if [[ -z "$scheme" && -n "$workspace" ]]; then
            scheme="$(xcodebuild -list -workspace "$workspace" | awk '
            /^Schemes:/ { in_schemes=1; next }
            in_schemes && NF {
              sub(/^[[:space:]]+/, "", $0)
              print
              exit
            }
          ')"
          fi

          if [[ -z "$scheme" ]]; then
            echo "No build scheme was detected"
            exit 1
          fi

          echo "workspace=${workspace:-<none>}"
          echo "project=${project:-<none>}"
          echo "scheme=$scheme"

          if [[ -n "$workspace" ]]; then
            xcodebuild \
              -workspace "$workspace" \
              -scheme "$scheme" \
              -configuration Release \
              -destination 'generic/platform=iOS Simulator' \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO \
              build
          else
            xcodebuild \
              -project "$project" \
              -scheme "$scheme" \
              -configuration Release \
              -destination 'generic/platform=iOS Simulator' \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO \
              build
          fi

          app_path="$(find build/Build/Products/Release-iphonesimulator -maxdepth 1 -name '*.app' | head -n 1)"

          if [[ -z "$app_path" ]]; then
            echo "No simulator app artifact was produced"
            exit 1
          fi

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: apps/mobile/build/Build/Products/Release-iphonesimulator/*.app