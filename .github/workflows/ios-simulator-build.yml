name: iOS Simulator Build

on:
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      CI: '1'
      COCOAPODS_DISABLE_STATS: 'true'
      EXPO_PUBLIC_API_URL: https://timisoara-app-production.up.railway.app
      EXPO_PUBLIC_STANDALONE_TRANSIT: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          pod --version

      - name: Install dependencies
        run: npm ci

      - name: Verify Metro resolves React Native from the app workspace
        working-directory: apps/mobile
        run: |
          set -euo pipefail

          npx expo export --platform ios --clear --dump-sourcemap

          map_file="$(find dist -type f -name '*.map' | head -n 1)"

          if [[ -z "$map_file" ]]; then
            echo "No source map was generated"
            exit 1
          fi

          app_rn_count="$(grep -o "$GITHUB_WORKSPACE/apps/mobile/node_modules/react-native/" "$map_file" | wc -l | tr -d ' ')"
          root_rn_count="$(grep -o "$GITHUB_WORKSPACE/node_modules/react-native/" "$map_file" | wc -l | tr -d ' ')"

          echo "app_rn_count=$app_rn_count"
          echo "root_rn_count=$root_rn_count"

          if [[ "$root_rn_count" != "0" ]]; then
            echo "Unexpected hoisted React Native paths found in the iOS bundle source map"
            exit 1
          fi

      - name: Generate iOS project
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --non-interactive --clean

      - name: Build release simulator app
        working-directory: apps/mobile
        run: |
          set -euo pipefail

          workspace="$(find ios -maxdepth 1 -name '*.xcworkspace' | head -n 1)"

          if [[ -z "$workspace" ]]; then
            echo "No Xcode workspace was generated"
            exit 1
          fi

          scheme="$(xcodebuild -list -workspace "$workspace" | awk '
            /^Schemes:/ { in_schemes=1; next }
            in_schemes && NF {
              sub(/^[[:space:]]+/, "", $0)
              print
              exit
            }
          ')"

          if [[ -z "$scheme" ]]; then
            echo "No build scheme was detected"
            exit 1
          fi

          echo "workspace=$workspace"
          echo "scheme=$scheme"

          xcodebuild \
            -workspace "$workspace" \
            -scheme "$scheme" \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

          app_path="$(find build/Build/Products/Release-iphonesimulator -maxdepth 1 -name '*.app' | head -n 1)"

          if [[ -z "$app_path" ]]; then
            echo "No simulator app artifact was produced"
            exit 1
          fi

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: apps/mobile/build/Build/Products/Release-iphonesimulator/*.app